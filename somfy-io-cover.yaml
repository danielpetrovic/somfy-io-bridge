# Reusable per-cover package for the Somfy IO bridge.
# Included once per physical cover from somfy-io-bridge.yaml with a unique
# `cover_id` (used to build entity/component IDs), `cover_name`
# (documentation only, the actual displayed name comes from the matching
# entry in the main file's `esphome.devices` list, see the note there about
# why device names are generic/room-less), `device_class` (see README's
# "Cover device classes" table), `node`/`key` (fixed bonded identity from
# secrets.yaml - leave both as empty strings to auto-generate and persist
# on-device instead, see README's "Board-independent identity" section), and
# optionally `broadcast_type` (see README's "Broadcast type caveat") and
# `travel_time_open`/`travel_time_close` (only used in "1W Timed" mode - just
# the initial default, also runtime-adjustable from HA via the Travel Time
# Open/Close number entities below, which persist across reboots).
# `${cover_id}_device` must exist in the main file's `esphome.devices` list,
# this is what makes each cover show up as its own HA device.
substitutions:
  cover_id: "changeme"
  cover_name: "Change Me"
  device_class: "shutter"
  node: ""
  key: ""
  broadcast_type: "0"
  travel_time_open: "25s"
  travel_time_close: "25s"

cover:
  - platform: iohc
    id: ${cover_id}
    # Empty name marks this as the device's primary entity, its displayed
    # name and entity_id come from the device's own name (see
    # esphome.devices in the main file), not name+device+area all
    # concatenated (which is what caused entity_ids like
    # cover.bedroom_bedroom_curtain_bedroom_curtain on the RTS bridge).
    name: ""
    device_id: ${cover_id}_device
    iohc_id: iohc_hub
    device_class: ${device_class}
    node: ${node}
    key: ${key}
    broadcast_type: ${broadcast_type}
    travel_time_open: ${travel_time_open}
    travel_time_close: ${travel_time_close}

button:
  - platform: iohc
    id: ${cover_id}_pair
    # Short name, combines with the device's own name to display as e.g.
    # "Garden Shutter Pair" without literally repeating the room/type.
    name: "Pair"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: add
  - platform: iohc
    id: ${cover_id}_unpair
    name: "Unpair"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: remove

select:
  - platform: iohc
    id: ${cover_id}_mode
    name: "Mode"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}

number:
  - platform: iohc
    id: ${cover_id}_travel_time_open
    name: "Travel Time Open"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: open
  - platform: iohc
    id: ${cover_id}_travel_time_close
    name: "Travel Time Close"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: close
