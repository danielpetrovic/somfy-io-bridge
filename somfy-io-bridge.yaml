# Onboard SSD1306 128x64 OLED (same pins/model as the RTS bridge)
i2c:
  sda: GPIO21
  scl: GPIO22

# Exposes free heap/block/fragmentation, loop time, and reset reason -
# only loop_time and reset_reason are actually used below (see their own
# comments for why); the others are skipped as not currently useful.
debug:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      entity_category: diagnostic
  # Why the board last rebooted (power-on, crash, watchdog, brownout, or a
  # deliberate restart - which shows as "Reboot request from <component>",
  # e.g. our own Restart button, OTA, or an API-initiated reboot) - worth
  # having given these boards can end up somewhere hard to physically check
  # on (e.g. wall-mounted, outdoor-adjacent). Named to match the "Restart"
  # button below (YAML key stays reset_reason - that's ESPHome's own name
  # for this option, not user-facing).
  - platform: debug
    reset_reason:
      name: "Restart Reason"
      entity_category: diagnostic

# Same diagnostic entities as the RTS bridge, plus one IO-specific one
# (debug: loop_time) that isn't on RTS.
sensor:
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi Signal"
    entity_category: diagnostic
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    update_interval: 60s
  # How long the last main loop iteration took - worth tracking here
  # specifically because we've directly observed real slow-loop warnings
  # during heavy radio traffic in this project ("logger took a long time
  # for an operation"), so this turns that into an ongoing HA-visible
  # health metric instead of only showing up live in serial logs.
  - platform: debug
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic
  # Passive 2W key-sniffing (Findings 27/28) no longer has its own button -
  # it's auto-armed/disarmed by the Debug Logging switch below instead (see
  # that switch's turn_on_action/turn_off_action), bridge-wide rather than
  # tied to any one cover, so it's ready whenever a real pairing/bonding
  # attempt might happen without a separate manual step.

# Toggles full protocol decode logging on/off without a reflash. Scoped to
# this component's own log tags only - a global level bump would also
# unmute unrelated components' own verbose logging (e.g. the OLED's I2C
# driver spamming every byte of every glyph write).
switch:
  - platform: template
    name: "Debug Logging"
    icon: mdi:bug
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      # Explicit, always-visible confirmation - ESPHome's own default
      # switch-toggle log line is normally DEBUG level, which `initial_level:
      # INFO` above (added in the same commit as this switch) silently
      # suppresses unless a tag is individually bumped - this bypasses that
      # by logging at INFO on the default/unfiltered tag before touching any
      # iohc.* tag levels below.
      - logger.log:
          format: "Debug Logging turned ON"
          level: INFO
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.remote1w}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.upstream}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.button}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.mode_select}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.cover}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.radio}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.packet}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.crypto}
      - logger.set_level: {level: VERY_VERBOSE, tag: iohc.controller2w}
    turn_off_action:
      - logger.log:
          format: "Debug Logging turned OFF"
          level: INFO
      - logger.set_level: {level: INFO, tag: iohc}
      - logger.set_level: {level: INFO, tag: iohc.remote1w}
      - logger.set_level: {level: INFO, tag: iohc.upstream}
      - logger.set_level: {level: INFO, tag: iohc.button}
      - logger.set_level: {level: INFO, tag: iohc.mode_select}
      - logger.set_level: {level: INFO, tag: iohc.cover}
      - logger.set_level: {level: INFO, tag: iohc.radio}
      - logger.set_level: {level: INFO, tag: iohc.packet}
      - logger.set_level: {level: INFO, tag: iohc.crypto}
      - logger.set_level: {level: INFO, tag: iohc.controller2w}
  # Opportunistic background 3-channel RX hop (Finding 31/32) - deliberately
  # its own switch, separate from Debug Logging: this is about giving the
  # radio a shot at catching a rare bonding-key exchange on CH1/CH3, not
  # about log verbosity, and running it unattended for a long stretch
  # shouldn't require also paying for continuous VERY_VERBOSE logging
  # overhead. Costs real 1W/ordinary-2W reception reliability while on (see
  # iohc.h's set_manual_hop_wanted() comment) - CH2-only (fully reliable)
  # otherwise. Safe to combine with Debug Logging or an active
  # Program (2W) bonding attempt, which requests the hop independently.
  - platform: template
    name: "Channel Hop (2W)"
    icon: mdi:swap-horizontal
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - logger.log:
          format: "Channel Hop (2W) turned ON - RX now sweeping CH1/CH2/CH3"
          level: WARN
      - lambda: id(iohc_hub).set_manual_hop_wanted(true);
    turn_off_action:
      - logger.log:
          format: "Channel Hop (2W) turned OFF - RX back to CH2 only"
          level: WARN
      - lambda: id(iohc_hub).set_manual_hop_wanted(false);
  # Blanks the OLED without cutting power - useful for a wall-mounted unit at
  # night, and reduces long-term burn-in. Reflects real hardware state
  # (is_on()), not just an assumed toggle.
  - platform: template
    name: "Display"
    icon: mdi:monitor
    entity_category: config
    lambda: return id(oled)->is_on();
    turn_on_action:
      - lambda: id(oled)->turn_on();
      - logger.log:
          format: "Display turned ON"
          level: INFO
    turn_off_action:
      - lambda: id(oled)->turn_off();
      - logger.log:
          format: "Display turned OFF"
          level: INFO

# Display Brightness actually drives the SSD1306's contrast register (0x81) -
# there's no separate backlight to dim on this panel, contrast is what
# changes perceived brightness. Display Page Interval reads/writes the
# page_cycle_interval component above via PollingComponent's own
# get/set_update_interval() - but set_update_interval() alone only updates
# the stored value, it does NOT rearm the already-scheduled timer (that's
# set once in PollingComponent::call_setup() and never re-read), so
# start_poller() is also called to actually reschedule with the new value.
#
# Both numbers use lambda: (not optimistic:) for real hardware read-back,
# which means TemplateNumber::control() does NOT publish the new value to HA
# immediately - it only republishes on the next scheduled poll, so without
# the explicit update() call below HA's displayed value would lag up to
# update_interval (60s) behind whatever was just set.
globals:
  - id: display_brightness
    type: float
    restore_value: true
    initial_value: "0.1"
  - id: display_page_interval
    type: float
    restore_value: true
    initial_value: "2.0"

number:
  - platform: template
    id: display_brightness_number
    name: "Display Brightness"
    icon: mdi:brightness-6
    entity_category: config
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    update_interval: 60s
    lambda: return id(oled)->get_contrast();
    set_action:
      - lambda: |-
          id(oled)->set_contrast(x);
          id(display_brightness) = x;
          id(display_brightness_number)->update();
          ESP_LOGI("main", "Display Brightness set to %.2f", x);
  - platform: template
    id: display_page_interval_number
    name: "Display Page Interval"
    icon: mdi:timer-outline
    entity_category: config
    unit_of_measurement: s
    min_value: 1
    max_value: 30
    step: 1
    update_interval: 60s
    lambda: return id(page_cycle_interval)->get_update_interval() / 1000.0f;
    set_action:
      - lambda: |-
          id(page_cycle_interval)->set_update_interval((uint32_t)(x * 1000));
          id(page_cycle_interval)->start_poller();
          id(display_page_interval) = x;
          id(display_page_interval_number)->update();
          ESP_LOGI("main", "Display Page Interval set to %.0fs", x);

font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 14

# Per-cover pages: name on line 1; line 2 has this bridge's own local/HA
# position on the left and the real motor-reported position (from the
# Target Closure sensor, converted from closure% to the same open%
# convention as the left side) on the right; line 3 has this bridge's own
# last-heard RSSI for that motor. The right-side real position and the RSSI
# line both only ever show a value once real 2W traffic for that cover's
# motor_address has actually been overheard (see README's "Real position
# feedback" and "Last RSSI sensor" sections) - has_state() guards each one
# and falls back to "--" otherwise, e.g. for a cover with no motor_address
# configured at all, which never registers for either sensor.
display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    # Low by default (adjustable via the Display Brightness number) - plenty
    # readable up close, and reduces long-term OLED burn-in risk.
    contrast: 0.1
    pages:
      - id: page_bedroom_left
        lambda: |-
          it.printf(0, 0, id(my_font), "Bedroom Left");
          it.printf(0, 20, id(my_font), "%.0f%%", id(bedroom_left_shutter_io)->position * 100.0f);
          if (id(bedroom_left_shutter_io_target_closure)->has_state()) {
            it.printf(128, 20, id(my_font), TextAlign::TOP_RIGHT, "%.0f%%", 100.0f - id(bedroom_left_shutter_io_target_closure)->state);
          } else {
            it.printf(128, 20, id(my_font), TextAlign::TOP_RIGHT, "--");
          }
          if (id(bedroom_left_shutter_io_last_rssi)->has_state()) {
            it.printf(0, 40, id(my_font), "RSSI: %.0fdBm", id(bedroom_left_shutter_io_last_rssi)->state);
          } else {
            it.printf(0, 40, id(my_font), "RSSI: --");
          }
      - id: page_bedroom_middle
        lambda: |-
          it.printf(0, 0, id(my_font), "Bedroom Middle");
          it.printf(0, 20, id(my_font), "%.0f%%", id(bedroom_middle_shutter_io)->position * 100.0f);
          if (id(bedroom_middle_shutter_io_target_closure)->has_state()) {
            it.printf(128, 20, id(my_font), TextAlign::TOP_RIGHT, "%.0f%%", 100.0f - id(bedroom_middle_shutter_io_target_closure)->state);
          } else {
            it.printf(128, 20, id(my_font), TextAlign::TOP_RIGHT, "--");
          }
          if (id(bedroom_middle_shutter_io_last_rssi)->has_state()) {
            it.printf(0, 40, id(my_font), "RSSI: %.0fdBm", id(bedroom_middle_shutter_io_last_rssi)->state);
          } else {
            it.printf(0, 40, id(my_font), "RSSI: --");
          }
      - id: page_bedroom_right
        lambda: |-
          it.printf(0, 0, id(my_font), "Bedroom Right");
          it.printf(0, 20, id(my_font), "%.0f%%", id(bedroom_right_shutter_io)->position * 100.0f);
          if (id(bedroom_right_shutter_io_target_closure)->has_state()) {
            it.printf(128, 20, id(my_font), TextAlign::TOP_RIGHT, "%.0f%%", 100.0f - id(bedroom_right_shutter_io_target_closure)->state);
          } else {
            it.printf(128, 20, id(my_font), TextAlign::TOP_RIGHT, "--");
          }
          if (id(bedroom_right_shutter_io_last_rssi)->has_state()) {
            it.printf(0, 40, id(my_font), "RSSI: %.0fdBm", id(bedroom_right_shutter_io_last_rssi)->state);
          } else {
            it.printf(0, 40, id(my_font), "RSSI: --");
          }
      - id: page_gameroom_left
        lambda: |-
