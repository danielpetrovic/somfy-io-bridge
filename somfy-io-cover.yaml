# Reusable per-cover package for the Somfy IO bridge.
# Included once per physical cover from somfy-io-bridge.yaml with a unique
# `cover_id` (used to build entity/component IDs), `cover_name`
# (documentation only - keep it identical to the matching entry's `name:` in
# the main file's `esphome.devices` list, see the note there about why
# device names include the room), `device_class` (see README's
# "Cover device classes" table), `node`/`key` (fixed bonded identity from
# secrets.yaml - leave both as empty strings to auto-generate and persist
# on-device instead, see README's "Board-independent identity" section), and
# optionally `broadcast_type` (see README's "Broadcast type caveat"), and
# `motor_address` (the shutter's REAL Somfy address, completely different
# from node/key - see README's "Real position feedback" section for how to
# look it up and what it enables; leave empty to skip passive position sync
# for this cover).
# `${cover_id}_device` must exist in the main file's `esphome.devices` list,
# this is what makes each cover show up as its own HA device.
substitutions:
  cover_id: "changeme"
  cover_name: "Change Me"
  device_class: "shutter"
  node: ""
  key: ""
  broadcast_type: "0"
  motor_address: ""

cover:
  - platform: iohc
    id: ${cover_id}
    # Empty name marks this as the device's primary entity, its displayed
    # name and entity_id come from the device's own name (see
    # esphome.devices in the main file), not name+device+area all
    # concatenated (which is what caused entity_ids like
    # cover.bedroom_bedroom_curtain_bedroom_curtain on the RTS bridge).
    name: ""
    device_id: ${cover_id}_device
    iohc_id: iohc_hub
    device_class: ${device_class}
    node: ${node}
    key: ${key}
    broadcast_type: ${broadcast_type}
    motor_address: ${motor_address}

button:
  # Single button, matching the physical remote's own labeling (PROG) and
  # RTS's identical single-button design. NOT a motor-side toggle (checked
  # directly against upstream's own reference: Add/cmd=0x30 and Remove/
  # cmd=0x39 are two structurally distinct commands, neither is a toggle) -
  # instead, this dispatches to Add or Remove based on our own persisted
  # paired_ flag, exactly like a real remote decides locally which one to
  # send. No separate Unpair exists for the same reason RTS never had one.
  # Requires the motor to be in its programming window first (hold PROG on
  # an existing paired remote until it jogs), same as any other pairing
  # operation.
  - platform: iohc
    id: ${cover_id}_prog
    # Short name, combines with the device's own name to display as e.g.
    # "Garden Shutter Program (1W)" without literally repeating the
    # room/type. Spelled out (not "Prog") for a user unfamiliar with Somfy's
    # own abbreviation on the physical remote - internal naming (id,
    # RemoteButton enum, type: prog) stays as "Prog", only the HA-facing
    # name changed. "(1W)" suffix added once a real "(2W)" counterpart
    # existed below - no functional change, this button's behavior is
    # unchanged.
    name: "Program (1W)"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: prog
  # This bridge's own 2W bonding (Phase 3, see iohc_controller2w.h) - a
  # genuinely different action from Program (1W) above, not an alternate
  # way to do the same thing: bonds this bridge's shared 2W *controller*
  # identity (the TaHoma-like box role) with this cover's motor, separate
  # from the 1W *remote* identity Program (1W) manages. Experimental - the
  # actual bonding sequence has never been observed on a real motor as of
  # this writing (see io-2w-protocol.md Finding 14); expect this to need
  # real-hardware debugging the first time it's tried. Requires
  # motor_address to be set (see below) - refuses to arm otherwise.
  - platform: iohc
    id: ${cover_id}_prog2w
    name: "Program (2W)"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: prog2w
  # Direct My button - sends Vent (main=0xd8), the real My/favorite-position
  # command (confirmed via a live TaHoma capture), and updates the cover's
  # own displayed position/state the same way the position-slider path does.
  # Exists as its own button (not just reachable via the position slider)
  # since HA's slider only reliably reaches a clean middle value on some UIs.
  - platform: iohc
    id: ${cover_id}_my
    name: "My"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: my
  # Identify/locate (cmd 0x1E) - no physical remote has this, only known
  # from a real captured TaHoma frame and modeled as a best-guess signed 1W
  # frame (see iohc_remote1w.cpp), confirmed working against real hardware.
  # Split into 3 buttons matching Overkiz's own 3 distinct actions exactly:
  # Identify is the one-shot "blink to locate" version most automations
  # would use; Start/Stop Identify are for a manual continuous blink.
  - platform: iohc
    id: ${cover_id}_identify
    name: "Identify"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: identify
  - platform: iohc
    id: ${cover_id}_start_identify
    name: "Start Identify"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: start_identify
  - platform: iohc
    id: ${cover_id}_stop_identify
    name: "Stop Identify"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
    type: stop_identify

select:
  - platform: iohc
    id: ${cover_id}_mode
    name: "Mode"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}

sensor:
  # Standalone real-position sensor, matching Overkiz's own "Target closure"
  # convention exactly (0=open, 100=closed - see README's "Real position
  # feedback" section). Only ever publishes once real 2W traffic for this
  # cover's motor_address has actually been overheard - stays unavailable
  # otherwise (e.g. if motor_address wasn't set, or no compatible 2W
  # controller like TaHoma exists on this installation).
  - platform: iohc
    id: ${cover_id}_target_closure
    name: "Target Closure"
    device_id: ${cover_id}_device
    cover_id: ${cover_id}
